<nav class="nav-container">
  <div class="hidden-start">
    <div class="hl"></div>
    <div class="hr"></div>
  </div>
  <div class="logo" routerLink="/" (click)="scrollToTop()">NetShop</div>

  <ul class="nav-menu">
    <li (click)="gotoshopall()" routerLinkActive="active-link" tabindex="0">Shop</li>
    <li class="nav-auth-item">
      @if(isLoggedIn()) {
      <div (click)="handleProfileClick()" class="auth-trigger profile-active">
        @if (userAvatar()) {
        <span>{{ userName() }}</span>
        <img [src]="userAvatar()" class="nav-avatar">
        }
        @else {
        <i class="fa-solid fa-circle-user"></i>
        <span>member</span>
        }
      </div>
      }
      @else{
      <div  (click)="handleProfileClick(); this.router.navigate(['/'])" class="auth-trigger">
        <i class="fa-solid fa-circle-user"></i>
        <span>Log In</span>
      </div>
      }

    </li>
    <li routerLink="/cart" routerLinkActive="active-link" tabindex="0"><i class="fa-solid fa-cart-shopping"></i></li>
  </ul>
</nav>
